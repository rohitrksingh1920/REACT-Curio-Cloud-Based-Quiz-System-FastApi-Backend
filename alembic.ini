[alembic]
# Path to migration scripts — relative to THIS file (project root)
script_location = alembic

# Migration file naming: timestamp + revision + slug
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# Prepend project root to sys.path so backend.app.* imports work in env.py
prepend_sys_path = .

# Timezone for migration file timestamps
# Changed from UTC → Asia/Kolkata (IST, UTC+5:30)
# Migration file names will now reflect IST time.
timezone = Asia/Kolkata

# Max length of the slug portion of the filename
truncate_slug_length = 40

# SQLAlchemy URL — overridden by env.py reading DATABASE_URL from .env
sqlalchemy.url = postgresql://curio_user:localdevpass@localhost:5432/curio_db


# =============================================================
#  Post-write hooks (optional)
# =============================================================
[post_write_hooks]


# =============================================================
#  Logging
# =============================================================
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class     = StreamHandler
args      = (sys.stderr,)
level     = NOTSET
formatter = generic

[formatter_generic]
format  = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %Y-%m-%d %H:%M:%S
