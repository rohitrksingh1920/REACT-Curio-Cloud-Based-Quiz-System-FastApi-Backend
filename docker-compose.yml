



services:

  #  PostgreSQL 15 
  db:
    image: postgres:15-alpine
    container_name: curio_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       curio_db
      POSTGRES_USER:     curio_user
      POSTGRES_PASSWORD: localdevpass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U curio_user -d curio_db"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  #  FastAPI backend 
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: curio_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    # Load .env first so secrets are available as defaults,
    # then override only the values that differ in Docker (e.g. DATABASE_URL).
    # IMPORTANT: env_file values have LOWER priority than the environment: block,
    # so SMTP_USER / SMTP_PASS are NOT repeated below — they come from .env.
    env_file:
      - .env
    environment:
      #  Docker-specific overrides 
      # Database URL uses the Docker service name "db", not localhost
      DATABASE_URL:                 postgresql://curio_user:localdevpass@db:5432/curio_db
      DB_POOL_SIZE:                 "5"
      DB_MAX_OVERFLOW:              "10"
      DB_POOL_TIMEOUT:              "30"
      DB_POOL_RECYCLE:              "1800"
      SECRET_KEY:                   dev-secret-key-CHANGE-in-production-min-32-chars
      ALGORITHM:                    HS256
      ACCESS_TOKEN_EXPIRE_MINUTES:  "1440"
      APP_NAME:                     Curio
      APP_VERSION:                  "1.0.0"
      DEBUG:                        "True"
      ENVIRONMENT:                  development
      # Allow requests from both nginx (port 80) and direct (port 8000)
      FRONTEND_ORIGINS:             '["http://localhost","http://localhost:80","http://localhost:8000","http://127.0.0.1","http://127.0.0.1:8000","null"]'
      EMAILS_FROM_NAME:             Curio
      PYTHONPATH:                   /app
      #  SMTP 
      # SMTP_USER and SMTP_PASS are intentionally NOT set here.
      # They are read from the .env file via env_file above.
      # This prevents placeholder values from overriding real credentials.
      SMTP_HOST:                    smtp.gmail.com
      SMTP_PORT:                    "587"
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - static_data:/app/static
    working_dir: /app
    command: >
      sh -c "
        echo '>>> Waiting for DB...' &&
        sleep 3 &&
        echo '>>> Running Alembic migrations...' &&
        alembic -c /app/alembic.ini upgrade head &&
        echo '>>> Seeding demo data...' &&
        python -m backend.app.seed || echo 'Seed skipped (already seeded)' &&
        echo '>>> Starting uvicorn...' &&
        uvicorn backend.app.main:app --host 0.0.0.0 --port 8000 --log-level info
      "
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  #  Nginx — serves frontend + proxies /api/* and /docs to backend 
  nginx:
    image: nginx:1.25-alpine
    container_name: curio_nginx
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - static_data:/usr/share/nginx/static:ro
      - ./nginx/cloudquiz.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
    name: curio_postgres_data
  static_data:
    name: curio_static_data
