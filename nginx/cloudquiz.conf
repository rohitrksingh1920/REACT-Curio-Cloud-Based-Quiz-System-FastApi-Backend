


upstream cloudquiz_backend {
    server curio_backend:8000;
    keepalive 32;
}

gzip on;
gzip_types text/plain text/css application/json application/javascript text/javascript;
gzip_min_length 1024;

server {
    listen 80;
    listen [::]:80;
    server_name _;

    access_log /var/log/nginx/cloudquiz_access.log;
    error_log  /var/log/nginx/cloudquiz_error.log warn;

    add_header X-Frame-Options        "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy        "strict-origin" always;

    client_max_body_size 10M;

    #  Health check 
    location = /health {
        proxy_pass         http://cloudquiz_backend/health;
        proxy_http_version 1.1;
        proxy_set_header   Host      $host;
        proxy_set_header   X-Real-IP $remote_addr;
        access_log         off;
    }

    #  Swagger UI 
    location /docs {
        proxy_pass         http://cloudquiz_backend/docs;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    #  ReDoc 
    location /redoc {
        proxy_pass         http://cloudquiz_backend/redoc;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    #  OpenAPI JSON 
    location = /openapi.json {
        proxy_pass         http://cloudquiz_backend/openapi.json;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    #  API endpoints 
    location /api/ {
        proxy_pass            http://cloudquiz_backend/api/;
        proxy_http_version    1.1;
        proxy_set_header      Host              $host;
        proxy_set_header      X-Real-IP         $remote_addr;
        proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header      X-Forwarded-Proto $scheme;
        proxy_set_header      Connection        "";
        proxy_read_timeout    90s;
        proxy_connect_timeout 10s;
        # Allow large file uploads (avatar)
        client_max_body_size  10M;
    }

    #  Uploaded user avatars — MUST be BEFORE the image extension rule 
    # BUG FIX: the catch-all ~* \.(png|jpg|...) regex was matching
    # /static/avatars/abc.jpg and calling try_files $uri =404, returning
    # 404 because the file doesn't exist on nginx's filesystem.
    # Placing this location block first (more specific prefix = higher priority
    # when using ^~ modifier) forces nginx to proxy to the backend instead.
    location ^~ /static/ {
        proxy_pass            http://cloudquiz_backend/static/;
        proxy_http_version    1.1;
        proxy_set_header      Host              $host;
        proxy_set_header      X-Real-IP         $remote_addr;
        proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_cache_bypass    $http_pragma;
        # Cache avatars aggressively — they use UUID names so cache-busting is automatic
        expires               30d;
        add_header            Cache-Control "public, immutable";
    }

    #  Frontend SPA 
    root  /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    #  Frontend static assets (CSS, JS, fonts, icons) 
    # NOTE: This does NOT match /static/avatars/* because ^~ /static/ above
    # takes priority for anything starting with /static/.
    location ~* \.(css|js|woff|woff2|ttf|svg|ico|map)$ {
        expires    30d;
        add_header Cache-Control "public, immutable";
        try_files  $uri =404;
    }

    #  Deny hidden files 
    location ~ /\. {
        deny all;
    }
}
